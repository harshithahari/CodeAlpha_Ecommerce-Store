<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed Successfully!</title>
    <style>
        /* Modern CSS Reset & Beautiful Background Gradient */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* The Success Card Wrapper */
        .success-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .success-card:hover {
            transform: translateY(-5px);
        }

        /* Animated Green Badge */
        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #d4edda;
            color: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px auto;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Typography Styles */
        h1 {
            color: #2d3748;
            font-size: 26px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        p {
            color: #718096;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 8px 0;
        }

        .sub-text {
            color: #a0aec0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Shipping Details Box Styles */
        .shipping-box {
            background: #f8f9fa;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .shipping-box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
            color: #2d3748;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 6px;
        }

        .shipping-detail {
            font-size: 14px;
            color: #4a5568;
            margin: 6px 0;
            line-height: 1.4;
        }

        .shipping-detail strong {
            color: #2d3748;
        }

        /* Beautiful "Continue Shopping" Box Button */
        .continue-btn {
            display: inline-block;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            transition: all 0.3s ease;
            width: 80%;
            box-sizing: border-box;
        }

        .continue-btn:hover {
            background: linear-gradient(135deg, #218838 0%, #1e7e34 100%);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
            transform: scale(1.03);
        }

        .continue-btn:active {
            transform: scale(0.98);
        }

        /* Subtle Entry Animation */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-container">
            ✔
        </div>

        <h1>Order Confirmed!</h1>
        <p>Thank you for shopping with us.</p>
        <p>Your order has been recorded successfully.</p>
        <div class="sub-text">No further payment action is required.</div>
        
        {% if name or address or phone %}
            <div class="shipping-box">
                <h3>📦 Shipping Details</h3>
                <div class="shipping-detail"><strong>Name:</strong> {{ name }}</div>
                <div class="shipping-detail"><strong>Phone:</strong> {{ phone }}</div>
                <div class="shipping-detail"><strong>Address:</strong> {{ address }}</div>
            </div>
        {% endif %}
        
        <a href="{% url 'home' %}" class="continue-btn">
            🛍 Continue Shopping
        </a>
    </div>

</body>
</html>
