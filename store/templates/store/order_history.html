<!DOCTYPE html>
<html>
<head>
    <title>Order History</title>
</head>
<body>

<h1>My Orders</h1>

<a href="/">Continue Shopping</a>

<hr>

{% if orders %}

    {% for order in orders %}

        <h2>Order #{{ order.id }}</h2>

        <p>Date: {{ order.created_at }}</p>

        <p>Status: Completed</p>

        <hr>

    {% endfor %}

{% else %}

    <p>No completed orders yet.</p>

{% endif %}

</body>
</html>
