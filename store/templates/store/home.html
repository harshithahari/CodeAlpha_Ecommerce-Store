{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Online Store</title>
    <style>
        /* Modern font and setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #fff3f8 0%, #f0f4f8 100%) !important;
            color: #2d3748;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- FLOATING BUBBLES BACKGROUND SYSTEM --- */
        .bubble-area {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: -999 !important; /* Pushes the bubbles completely behind everything */
            overflow: hidden !important;
            pointer-events: none !important;
        }

        .bubble {
            position: absolute !important;
            bottom: -150px !important;
            border-radius: 50% !important;
            animation: floatUp 12s linear infinite !important;
            display: block !important;
            backdrop-filter: blur(2px);
        }

        /* Distinct colors, sizes, and placements to make sure they display perfectly */
        .bubble:nth-child(1) { left: 8%; width: 90px; height: 90px; animation-duration: 9s; background: rgba(255, 182, 193, 0.4) !important; } /* Pastel Pink */
        .bubble:nth-child(2) { left: 22%; width: 50px; height: 50px; animation-duration: 14s; animation-delay: 2s; background: rgba(173, 216, 230, 0.4) !important; } /* Pastel Blue */
        .bubble:nth-child(3) { left: 40%; width: 110px; height: 110px; animation-duration: 16s; background: rgba(144, 238, 144, 0.35) !important; } /* Pastel Green */
        .bubble:nth-child(4) { left: 58%; width: 60px; height: 60px; animation-duration: 11s; animation-delay: 4s; background: rgba(255, 222, 173, 0.4) !important; } /* Pastel Orange */
        .bubble:nth-child(5) { left: 72%; width: 85px; height: 85px; animation-duration: 13s; background: rgba(230, 190, 255, 0.4) !important; } /* Pastel Purple */
        .bubble:nth-child(6) { left: 88%; width: 45px; height: 45px; animation-duration: 10s; animation-delay: 1.5s; background: rgba(255, 182, 193, 0.3) !important; }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translateY(-130vh) scale(1.2);
                opacity: 0;
            }
        }
        /* --- END OF BACKGROUND SYSTEM --- */

        /* Main Interface Presentation Layout */
        .main-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 100; /* Forces interaction controls to stack on top */
        }

        h1 {
            text-align: center;
            color: #1a202c;
            font-size: 32px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .view-cart-link {
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            color: #007bff;
            transition: color 0.2s;
        }
        .view-cart-link:hover { color: #ff6b6b; }

        .search-form {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            padding: 10px 15px;
            width: 250px;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
        }

        .category-container {
            margin: 25px 0;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.84);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .category-container h3 { margin: 0 0 10px 0; font-size: 16px; color: #4a5568; }
        
        .category-link {
            text-decoration: none;
            color: #4a5568;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 15px;
            transition: all 0.2s;
        }
        .category-link:hover {
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: flex-start;
        }

        .product-card {
            border: none;
            border-radius: 16px;
            padding: 20px;
            width: 280px;
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }

        .product-card img {
            max-width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .product-card h2 { font-size: 18px; margin: 10px 0; color: #2d3748; }
        .product-card p { font-size: 14px; color: #718096; height: 40px; overflow: hidden; margin-bottom: 15px; }
        .product-card h3 { font-size: 20px; color: #1a202c; margin: 10px 0; }

        .btn-green {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(40,167,69,0.2);
            transition: all 0.2s;
        }
        .btn-green:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(40,167,69,0.3);
        }
    </style>
</head>
<body>

    <div class="bubble-area">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="main-wrapper">
        <h1>My E-commerce Store</h1>

        <a href="{% url 'cart' %}" class="view-cart-link">🛒 View Cart</a>

        <form method="GET" class="search-form">
            <input type="text"
                   name="q"
                   class="search-input"
                   placeholder="Search products..."
                   value="{{ request.GET.q }}">
            <button type="submit" class="btn-green">
                Search
            </button>
        </form>

        <div class="category-container">
            <h3>Filter by Category:</h3>
            <a class="category-link" href="{% url 'home' %}">All</a>
            <a class="category-link" href="?category=Mobiles">Mobiles</a>
            <a class="category-link" href="?category=Laptops">Laptops</a>
            <a class="category-link" href="?category=Accessories">Accessories</a>
        </div>

        <div class="products">
            {% for product in products %}
            <div class="product-card">
                <img src="{{ product.image }}" alt="{{ product.name }}">
                <h2>{{ product.name }}</h2>
                <p>{{ product.description }}</p>
                <h3>₹{{ product.price }}</h3>

                <a href="{% url 'add_to_cart' product.id %}">
                    <button class="btn-green">
                        Add to Cart
                    </button>
                </a>
            </div>
            {% empty %}
            <p style="text-align: center; width: 100%; color: #718096;">No products found.</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
